name: multimira

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: multimira
      POSTGRES_USER: ${POSTGRES_USER:-multimira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multimira}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

# Remi nginx reverse-proxy + unified auth.
#
# Single upstream — web service (port 6120) now serves both Dashboard SPA
# (under /home/*) and the public Board/Home SPA (everything else).
#
# Routing:
#   /api/auth/*    → public (login flow)
#   /api/*         → member required
#   /home/*        → admin required (Remi Dashboard)
#   /              → member required (Public Home / Board / Mission)
#   /assets/*      → public (SPA bundle)
#
# Installed by scripts/install-nginx.sh → /etc/nginx/sites-available/remi.

upstream remi_web { server 127.0.0.1:6120; keepalive 16; }

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 50m;
    proxy_http_version 1.1;
    proxy_buffering    off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    # ── Internal auth_request targets ─────────────────────────
    location = /_auth_admin {
        internal;
        proxy_pass              http://remi_web/api/auth/check?role=admin;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI    $request_uri;
        proxy_set_header        X-Original-Method $request_method;
        proxy_set_header        Cookie            $http_cookie;
    }
    location = /_auth_member {
        internal;
        proxy_pass              http://remi_web/api/auth/check?role=member;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI    $request_uri;
        proxy_set_header        X-Original-Method $request_method;
        proxy_set_header        Cookie            $http_cookie;
    }

    # ── Public: SSO login flow ───────────────────────────────
    location ^~ /api/auth/ {
        proxy_pass http://remi_web;
    }

    # ── Public: shared SPA assets ────────────────────────────
    location ^~ /assets/ {
        proxy_pass http://remi_web;
    }

    # ── Member-only: web API ─────────────────────────────────
    location ^~ /api/ {
        auth_request /_auth_member;
        error_page 401 = @login;
        error_page 403 = @forbidden;
        proxy_pass http://remi_web;
    }

    # ── Dashboard SPA — public at the network level. ─────────
    # The Dashboard SPA's AuthGate handles login UI itself,
    # and admin-only API endpoints (/api/v1/*) are still gated
    # by role checks at the handler layer. This avoids a nginx
    # redirect loop when an unauthenticated user lands here.
    location /home/ {
        proxy_pass http://remi_web;
    }
    location = /home {
        return 302 /home/;
    }

    # ── Public Board / Home / Mission (member required) ──────
    location / {
        auth_request /_auth_member;
        error_page 401 = @login;
        error_page 403 = @forbidden;
        proxy_pass http://remi_web;
    }

    # ── Error redirects ──────────────────────────────────────
    # 401 redirects browser to /home/ — which is now public, so
    # the Dashboard SPA renders and its AuthGate shows the login UI.
    # No redirect loop because /home/ has no auth_request.
    location @login {
        return 302 /home/?from=$request_uri;
    }
    location @forbidden {
        default_type text/html;
        return 403 '<!doctype html><meta charset="utf-8"><title>Forbidden</title>
<style>body{font:14px system-ui;max-width:520px;margin:80px auto;padding:0 20px;color:#333}h1{font-size:18px}</style>
<h1>403 Forbidden</h1>
<p>You are signed in, but this resource requires a higher role.
Contact an administrator if you believe this is in error.</p>
<p><a href="/home/">Back to Dashboard</a></p>';
    }
}

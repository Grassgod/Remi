# Remi Configuration
# Generated by `remi login`. Edit as needed.
# Docs: https://github.com/grasscoder/remi

# ── Feishu Bot ────────────────────────────────────────────
[feishu]
app_id = ""
app_secret = ""
domain = "feishu"
# allowed_groups = []
# monitor_groups = []

# ── Proxy (uncomment if behind a proxy) ──────────────────
# [proxy]
# http = "http://proxy:8118"
# no_proxy = "localhost,127.0.0.1"

# ── External plugins (optional) ──────────────────────────
# Drop-in plugins load from ~/.remi/plugins/<id>/ (plugin.json + built entry).
# Configure a plugin via its own [plugin.<id>] section. Example: ByteDance SSO
# (a private, ByteDance-only plugin distributed separately — not in this repo):
# [plugin.bytedance-passport]
# enabled = true
# client_id = ""

# ── Image Generation (optional) ──────────────────────────
# [google]
# api_key = ""

# ── Vector Search (optional) ─────────────────────────────
# [embedding]
# provider = "voyage"
# api_key = ""

# ── Services managed by PM2 ─────────────────────────────
# [[services]]
# name = "remi-web"
# script = "web/server.ts"
# interpreter = "bun"
# cwd = "/path/to/remi"
# port = 6120

# Remi Configuration
# Generated by `remi login`. Edit as needed.
# Docs: https://github.com/grasscoder/remi

# ── Feishu Bot ────────────────────────────────────────────
[feishu]
app_id = ""
app_secret = ""
domain = "feishu"
# allowed_groups = []
# monitor_groups = []

# ── Proxy (uncomment if behind a proxy) ──────────────────
# [proxy]
# http = "http://proxy:8118"
# no_proxy = "localhost,127.0.0.1"

# ── ByteDance SSO (optional, ByteDance employees only) ───
# Only used inside ByteDance — leave commented out for public/open-source use.
# Run `bun run src/main.ts auth bytedance-sso` after configuring.
# [bytedance_sso]
# client_id = ""

# ── Image Generation (optional) ──────────────────────────
# [google]
# api_key = ""

# ── Vector Search (optional) ─────────────────────────────
# [embedding]
# provider = "voyage"
# api_key = ""

# ── Services managed by PM2 ─────────────────────────────
# [[services]]
# name = "remi-web"
# script = "web/server.ts"
# interpreter = "bun"
# cwd = "/path/to/remi"
# port = 6120

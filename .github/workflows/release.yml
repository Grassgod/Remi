name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build release archive
        run: bun run build

      - name: Build Multiremi daemon CLI release archives
        run: MULTIREMI_VERSION="${GITHUB_REF_NAME}" bun run build:multiremi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            scripts/install.sh
            scripts/install-remi.sh
          generate_release_notes: true
